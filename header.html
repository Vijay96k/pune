<!DOCTYPE html>
<html>
<head>
    <title>Header</title>

    <style>
        body {
            margin: 0;
            color: white;
            text-align: center;
            font-family: Arial;
            background: url("image/header1.jpg") no-repeat center;
            background-size: cover;
        }

        h1 {
            margin-top: 20px;
            font-size: 40px;
            animation: glow 2s infinite alternate;

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 20px yellow; }
        }
    </style>
</head>
